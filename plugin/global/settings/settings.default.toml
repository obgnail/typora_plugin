[auto_number]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""

# =========== [ 编号生效范围 ] ===========
# 支持在以下层级中注入递增数字规则标识
ENABLE_OUTLINE = true # 侧边大纲树
ENABLE_CONTENT = true # 正文标题
ENABLE_TOC = false    # 正文的目录模块 (TOC)
ENABLE_TABLE = false  # 表格描述
ENABLE_IMAGE = false  # 图注描述
ENABLE_FENCE = false  # 代码块标注

# =========== [ 样式与对齐位置 ] ===========
# 图片编号同时展示原始文件名 (损耗性能，慎重开启)
# 仅当 ENABLE_IMAGE 为 true 时此选项有效
SHOW_IMAGE_NAME = false

# 下标渲染字体 (推荐等宽字体，规避长短不一)
FONT_FAMILY = "monospace"

# 编号下标位置：编号下标相对于元素的对齐方式
#   left  : 编号显示在元素的左侧
#   right : 编号显示在元素的右侧
#   center: 编号显示在元素的中间
ALIGN = "center"

# 表格编号位置
#   before: 表格上方
#   after : 表格下方
POSITION_TABLE = "after"

# =========== [ 导出 ] ===========
# 导出时运用样式：在导出为 HTML/PDF 时保留自动编号样式
ENABLE_WHEN_EXPORT = true

# 导出时对标题应用编号的劫持钩子（高级配置，需了解 JavaScript）
# 若 ENABLE_WHEN_EXPORT 为 false，则此选项失效
APPLY_EXPORT_HEADER_NUMBERING = """
(headers) => {
    const counters = Array(7).fill(0)
    headers.forEach(header => {
        const [level, text, ...rest] = header
        counters[level]++
        counters.fill(0, level + 1)
        const counter = counters.slice(2, level + 1).join('.')
        const numbering = counter ? `${counter}. ` : ""
        header[1] = numbering + text
    })
}
"""

# =========== [ 编号格式与布局设定 ] ===========
# 编号格式定义。支持自定义不同元素的编号格式，包含的元素类型
#   content-h1 ~ content-h6:  正文内容的一至六级标题
#   outline-h1 ~ outline-h6:  大纲视图的一至六级标题
#   toc-h1 ~ toc-h6        :  TOC 的一至六级标题
#   table                  :  表格
#   image                  :  图片
#   fence                  :  代码块
#
# 编号格式语法: 借鉴 Python f-string 语法
#   格式: "前缀{计数器名称:计数样式}后缀"
#   示例: image = "图{i:cjk}"
#   结果: 图一, 图二, 图三... ("图"为前缀，{i:cjk}为编号核心，后缀为空)
#
# 组合多个计数器
#   示例：content-h4 = "{c2:ua}-{c3:cjk}.{c4:ur}"
#   结果：当前为第 2 个二级标题，第 5 个三级标题，第 3 个四级标题，结果为 B-五.III
#
# 计数器名称
#   c1 ~ c6: 正文 1~6 级标题
#   o1 ~ o6: 大纲 1~6 级标题
#   t1 ~ t6: 目录 1~6 级标题
#   t      : 表格
#   i      : 图片
#   f      : 代码块
#
# 可用计数样式
#   d  : 阿拉伯数字 (1, 2, 3...)        *默认值。{c2:d} 可省略为 {c2}*
#   dlz: 前导零阿拉伯数字 (01, 02, 03...)
#   lr : 小写罗马数字 (i, ii, iii...)
#   ur : 大写罗马数字 (I, II, III...)
#   la : 小写英文字母 (a, b, c...)
#   ua : 大写英文字母 (A, B, C...)
#   lg : 小写希腊字母 (α, β, γ...)
#   hs : 天干 (甲, 乙, 丙...)
#   eb : 地支 (子, 丑, 寅...)
#   cjk: 汉字数字 (一, 二, 三...)
#   scf: 简体中文大写数字 (壹, 贰, 叁...)  *仅新版 Typora 支持*
#   tcf: 繁体中文大写数字 (壹, 贰, 參...)  *仅新版 Typora 支持*
#   jf : 日文汉字大写数字 (壱, 弐, 参...)  *仅新版 Typora 支持*
#   hi : 平假名 (あ, い, う...)          *仅新版 Typora 支持*
#   ka : 片假名 (ア, イ, ウ...)          *仅新版 Typora 支持*
#   di : 实心圆点 (●)
#   ci : 空心圆点 (○)
#   sq : 实心方块 (■)
#   no : 无 (不显示编号)

# 布局
#   定义多个布局，并选择一个作为当前使用布局
#   每个布局包含完整的编号格式定义。若某一元素无需编号，置为 ""
# 布局配置
#   name    : 布局名称，标识不同布局
#   selected: 选中状态。true 表示应用此布局编号格式
#   layout  : 布局具体设置
