# 全局开关：代码块右上角功能组注入 (为 false 则以下按钮相关配置全部失效)
ENABLE_BUTTON = true

# 按钮大小
BUTTON_SIZE = "1.2em"

# 按钮颜色
BUTTON_COLOR = "currentColor"

# 按钮内边距
BUTTON_PADDING = "0.2em"

# 按钮距离代码块顶部距离
BUTTON_TOP = "0.3em"

# 按钮距离代码块右侧距离
BUTTON_RIGHT = "0.5em"

# 按钮初始不透明度，取值范围 0 到 1
BUTTON_OPACITY = 0.5

# 鼠标悬停时按钮不透明度，取值范围 0 到 1
BUTTON_OPACITY_HOVER = 0.8

# 悬浮提示：隐藏工具按钮悬浮 tooltip 提示
HIDE_BUTTON_HINT = false

# 自动隐藏：仅鼠标移入代码块展示工具按钮 (处于折叠状态始终常驻提示)
AUTO_HIDE = false

# =========== [ 复制/缩进/折叠 ] ===========
# 启用复制代码功能
# 若置为 false，则选项 TRIM_WHITESPACE_ON_COPY、LINE_BREAKS_ON_COPY、COPY_AS_MARKDOWN 失效
ENABLE_COPY = true

# 复制时移除首尾空白
TRIM_WHITESPACE_ON_COPY = false

# 执行复制时换行符操作
#   lf      : 转为 LF
#   crlf    : 转为 CRLF
#   preserve: 保持原状
LINE_BREAKS_ON_COPY = "preserve"

# 是否复制为 Markdown
#   true:  复制为 Markdown
#   false: 复制为纯文本
COPY_AS_MARKDOWN = false

# 缩进按钮增强：一键格式化缩进层级 (低版本 Typora 兼容不佳)
# 若置为 false，则选项 EXCLUDE_LANGUAGE_ON_INDENT 失效
ENABLE_INDENT = true

# 调整缩进时忽略处理的语言
EXCLUDE_LANGUAGE_ON_INDENT = ["python", "ruby", "yaml", "yml"]

# 启用折叠代码功能
ENABLE_FOLD = true

# 手动折叠保留行数
MANUAL_FOLD_LINES = 5

# 自动折叠保留行数
AUTO_FOLD_LINES = 5

# 折叠截断模式
#   hidden: 隐藏
#   scroll: 滚动条
FOLD_OVERFLOW = "scroll"

# 加载时默认折叠代码块
# 若置为 false，则选项 DEFAULT_FOLD_THRESHOLD、EXPAND_ON_FOCUS、FOLD_ON_BLUR 失效
DEFAULT_FOLD = false

# 折叠阈值：开启默认折叠后，超越该行数自动隐匿 (0 为全折叠)
DEFAULT_FOLD_THRESHOLD = 10

# 聚焦代码块时展开已折叠的代码块
# 注意：受 DEFAULT_FOLD_THRESHOLD 影响，未达到阈值不折叠
EXPAND_ON_FOCUS = false

# 失焦代码块时折叠已展开的代码块
FOLD_ON_BLUR = false

# 状态还原：反馈提示图层（如“打钩”）驻留时间 (毫秒)
HINT_DURATION = 1000

# =========== [ 高级自定义按钮 ] ===========
# 自定义按钮：支持添加自定义按钮到代码块（高级配置，需了解 JavaScript）
#   DISABLE  : 是否禁用此按钮
#   ICON     : 按钮图标 CSS class (Font Awesome 4.1.0 图标库)
#   HINT     : 鼠标悬停在按钮上时显示的功能提示
#   ON_INIT  : 初始化函数字符串，此函数仅在插件初始化时执行一次，不需要则置为空 ""。示例: plu => console.log('initialized')
#   ON_RENDER: 渲染后回调函数字符串，每次页面渲染代码块执行此函数，不需要则置为空 ""。示例: ({ btn, fence, cid, enhance }) => console.log('rendered')
#   ON_CLICK : 点击按钮时的回调函数字符串，必填。示例: ({ ev, btn, cont, fence, cm, cid, plu }) => console.log('clicked')
CUSTOM_BUTTONS = []

# =========== [ 快捷键设定 ] ===========
# 启用基于 CodeMirror 内置派发的快捷键接管
# 参考: https://codemirror.net/5/doc/manual.html#keymaps
# 置为 false 时以下配置全部失效
# 注意勿于现有快捷键冲突
#   Ctrl-A        : selectAll
#   Ctrl-Up       : goDocStart
#   Ctrl-Down     : goDocEnd
#   Ctrl-Left     : goGroupLeft
#   Ctrl-Right    : goGroupRight
#   Alt-Left      : goLineStart
#   Alt-Right     : goLineEnd
#   Ctrl-Backspace: delGroupBefore
#   Ctrl-Delete   : delGroupAfter
#   Ctrl-[        : indentLess
#   Ctrl-]        : indentMore
#   Ctrl-U        : undoSelection
#   Shift-Ctrl-U  : redoSelection
#   Alt-U         : redoSelection
ENABLE_HOTKEY = true

# 与上一行互换
SWAP_PREVIOUS_LINE = "Shift-Alt-Up"

# 与下一行互换
SWAP_NEXT_LINE = "Shift-Alt-Down"

# 复制到上一行
COPY_PREVIOUS_LINE = "Ctrl-Alt-Up"

# 复制到下一行
COPY_NEXT_LINE = "Ctrl-Alt-Down"

# 在上方插入一行
INSERT_LINE_PREVIOUS = "Shift-Ctrl-Enter"

# 在下方插入一行
INSERT_LINE_NEXT = "Ctrl-Enter"

# 高级快捷键绑定注入：支持添加自定义代码块快捷键（高级配置，需了解 JavaScript）
#   DISABLE: 禁用快捷键
#   HOTKEY: 快捷键组合 (例如 Shift-Ctrl-K)
#   CALLBACK: 快捷键回调函数 (必填)
#     参数: { pre, cid, cm, cursor, lineNum, lastNum, separator }
#     示例: ({ pre, cid, cm, cursor, lineNum, lastNum, separator }) => console.log('callback')
CUSTOM_HOTKEYS = []

# =========== [ 代码折叠与高亮配置 ] ===========
# 根据语言特征自动注入代码层级折叠符号
ENABLE_LANGUAGE_FOLD = true

# 代码行高亮：基于 Vitepress 行高亮语法动态赋色
# 举例：```js{2, 5-8, 10-12}``` 表示高亮 js 代码块对应行
# 详见：https://vitepress.dev/guide/markdown#line-highlighting-in-code-blocks
HIGHLIGHT_BY_LANGUAGE = false

# 行号基准
#   1-based: 从 1 开始
#   0-based: 从 0 开始
NUMBERING_BASE = "1-based"

# 行高亮格式
HIGHLIGHT_PATTERN = '^(?<lang>[^{}]+){(?<line>[\d\s,-]+)}$'

# 高亮行背景色设定 (由代码块语言参数触发)
HIGHLIGHT_LINE_COLOR_BY_LANGUAGE = "rgba(142, 150, 170, 0.14)"

# 高亮鼠标悬停代码行
HIGHLIGHT_ON_HOVER = false

# 鼠标悬停代码行背景色
HIGHLIGHT_LINE_COLOR_ON_HOVER = "rgba(142, 150, 170, 0.14)"

# 高亮光标聚焦代码行
HIGHLIGHT_ON_FOCUS = false

# 光标聚焦代码行背景色
HIGHLIGHT_LINE_COLOR_ON_FOCUS = "rgba(142, 150, 170, 0.14)"

# =========== [ 其他高级选项 ] ===========
# 自动缩进对齐：规避长文本换行后缩进被打乱 (损耗渲染性能)
# 详见：https://github.com/codemirror/codemirror5/issues/2085
INDENTED_WRAPPED_LINE = false

