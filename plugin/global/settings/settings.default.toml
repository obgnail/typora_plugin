[auto_number]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Scope ] ===========
# Master switches for injecting incremental numbers into specific UI/Document levels
ENABLE_OUTLINE = true # Sidebar outline tree
ENABLE_CONTENT = true # Document content headings
ENABLE_TOC = false    # Document TOC module
ENABLE_TABLE = false  # Table captions
ENABLE_IMAGE = false  # Image captions
ENABLE_FENCE = false  # Code block captions

# =========== [ Styling & Alignment ] ===========
# Show image file alias alongside image numbers (Performance intensive; use with caution)
# Requires ENABLE_IMAGE = true
SHOW_IMAGE_NAME = false

# Subscript rendering font
FONT_FAMILY = "monospace"

# Subscript alignment relative to the element
#   left  : Align Left
#   right : Align Right
#   center: Align Center
ALIGN = "center"

# Table numbering injection position
#   before: Above the table
#   after : Below the table
POSITION_TABLE = "after"

# =========== [ Export ] ===========
# Retain injected numbering styling when exporting to HTML/PDF
ENABLE_WHEN_EXPORT = true

# Hijacking hook to apply numbering logic directly to headers during export (Advanced JS Config)
# Requires ENABLE_WHEN_EXPORT = true
APPLY_EXPORT_HEADER_NUMBERING = """
(headers) => {
    const counters = Array(7).fill(0)
    headers.forEach(header => {
        const [level, text, ...rest] = header
        counters[level]++
        counters.fill(0, level + 1)
        const counter = counters.slice(2, level + 1).join('.')
        const numbering = counter ? `${counter}. ` : ""
        header[1] = numbering + text
    })
}
"""

# =========== [ Layouts ] ===========
# Customize explicit format rules for different numbering scopes
# Scopes: content-h1 ~ content-h6, outline-h1 ~ outline-h6, toc-h1 ~ toc-h6, table, image, fence
#
# Syntax Schema (Inspired by Python f-strings):
#   Format: "Prefix{CounterName:CounterStyle}Suffix"
#   Example: image = "Figure {i:cjk}" -> Figure 一, Figure 二..
#
# Multi-Counter Combination:
#   Example: content-h4 = "{c2:ua}-{c3:cjk}.{c4:ur}" -> B-五.III
#
# Counter Names:
#   c1~c6: Content H1~H6
#   o1~o6: Outline H1~H6
#   t1~t6: TOC H1~H6
#   t    : Table
#   i    : Image
#   f    : Code block
#
# Counter Styles:
#   d  : Decimal numbers (1, 2, 3...)  *Default. '{c2:d}' equals '{c2}'*
#   dlz: Decimal leading zero (01, 02, 03...)
#   lr : Lower Roman (i, ii, iii...)
#   ur : Upper Roman (I, II, III...)
#   la : Lower Alpha (a, b, c...)
#   ua : Upper Alpha (A, B, C...)
#   lg : Lower Greek (α, β, γ...)
#   hs : Heavenly Stem (甲, 乙, 丙...)
#   eb : Earthly Branch (子, 丑, 寅...)
#   cjk: CJK Ideographs (一, 二, 三...)
#   scf: Simplified Chinese Formal (壹, 贰, 叁...)  *Newer Typora only*
#   tcf: Traditional Chinese Formal (壹, 贰, 參...)  *Newer Typora only*
#   jf : Japanese Formal (壱, 弐, 参...)  *Newer Typora only*
#   hi : Hiragana (あ, い, う...)  *Newer Typora only*
#   ka : Katakana (ア, イ, ウ...)  *Newer Typora only*
#   di : Disc (●)
#   ci : Circle (○)
#   sq : Square (■)
#   no : None (Hides numbering)

# Layout Config Definitions
#   name    : Unique layout identifier
#   selected: Set to `true` to apply this specific layout
#   layout  : Explicit rule mapping. Empty strings ("") bypass numbering for that scope
[[auto_number.LAYOUTS]]
name = "Layout::Decimal-H1"
selected = false
[auto_number.LAYOUTS.layout]
content-h1 = "{c1}. "
content-h2 = "{c1}.{c2} "
content-h3 = "{c1}.{c2}.{c3} "
