    ["#7FC97F", "#BEAED4", "#FDC086", "#FFFF99", "#386CB0", "#F0027F", "#BF5B17", "#666666"],
    ["#FBB4AE", "#B3CDE3", "#CCEBC5", "#DECBE4", "#FED9A6", "#FFFFCC", "#E5D8BD", "#FDDAEC", "#F2F2F2"],
    ["#E41A1C", "#377EB8", "#4DAF4A", "#984EA3", "#FF7F00", "#FFFF33", "#A65628", "#F781BF", "#999999"],
    ["#4E79A7", "#F28E2C", "#E15759", "#76B7B2", "#59A14F", "#EDC949", "#AF7AA1", "#FF9DA7", "#9C755F", "#BAB0AB"],
    ["#1F77B4", "#FF7F0E", "#2CA02C", "#D62728", "#9467BD", "#8C564B", "#E377C2", "#7F7F7F", "#BCBD22", "#17BECF"],
    ["#A6CEE3", "#1F78B4", "#B2DF8A", "#33A02C", "#FB9A99", "#E31A1C", "#FDBF6F", "#FF7F00", "#CAB2D6", "#6A3D9A", "#FFFF99", "#B15928"],
    ["#8DD3C7", "#FFFFB3", "#BEBADA", "#FB8072", "#80B1D3", "#FDB462", "#B3DE69", "#FCCDE5", "#D9D9D9", "#BC80BD", "#CCEBC5", "#FFED6F"],
]

# Default TOC Options: Customize TOC diagram appearance and behavior
#   duration          : Node folding/expanding animation duration (ms)
#   initialExpandLevel: Render depth on initialization (-1 to expand all)
#   colorFreezeLevel  : Node depth where branch colors stop generating new variations
#   maxInitialScale   : Max scaling ratio on first render
#   zoom              : Allow manual zooming
#   pan               : Allow manual panning
#   toggleRecursively : Toggle nodes recursively
#   color             : Active color scheme array (e.g., ["#1F77B4", "#17BECF"])
#   maxWidth          : Max node width (0 means unlimited)
#   nodeMinHeight     : Min node height
#   spacingHorizontal : Horizontal node spacing
#   spacingVertical   : Vertical node spacing
#   paddingX          : Node internal padding
#   fitRatio          : Window fill ratio margin
DEFAULT_TOC_OPTIONS = { duration = 500, initialExpandLevel = -1, maxInitialScale = 2, maxWidth = 0, nodeMinHeight = 16, spacingHorizontal = 80, spacingVertical = 5, fitRatio = 0.95, paddingX = 8, colorFreezeLevel = 7, zoom = true, pan = true, toggleRecursively = false, color = ["#1F77B4", "#FF7F0E", "#2CA02C", "#D62728", "#9467BD", "#8C564B", "#E377C2", "#7F7F7F", "#BCBD22", "#17BECF"] }

# Customize exported SVG/Image settings
#   FILENAME: Output filename format. Supported placeholders
#     {{filename}} : Current Markdown filename
#     {{timestamp}}: Current timestamp
#     {{random}}   : Random alphanumeric string
#   FOLDER: Output directory path. Leave blank to use system TEMP directory. Supports absolute paths (e.g., "D:\\tmp\\img")
#   REMOVE_USELESS_CLASSES: Strip useless CSS classes to reduce SVG file size
#   REMOVE_FOREIGN_OBJECT: Replace <foreignObject> tags with <text>
#     true : Improves SVG compatibility across renderers, but may lose advanced styling
#     false: Preserves <foreignObject> for perfect styling, but may cause rendering issues in third-party viewers (Default recommended)
#   PADDING_HORIZONTAL: Graphic horizontal padding
#   PADDING_VERTICAL: Graphic vertical padding
#   IMAGE_SCALE: Export resolution scale multiplier
#   IMAGE_QUALITY: JPG/WebP export quality (0.0 ~ 1.0)
#   KEEP_ALPHA_CHANNEL: Preserve transparent background channel for PNG/WEBP exports
#     true : Export with transparent background
#     false: Fill background using BACKGROUND_COLOR
#   BACKGROUND_COLOR: Fallback background color for pixel exports
#   TEXT_COLOR: Node font color
#   OPEN_CIRCLE_COLOR: Color of expanded node indicators
#   SHOW_PATH_INQUIRY_DIALOG: Prompt directory selection dialog before saving
#   SHOW_IN_FINDER: Automatically open the output directory after saving
DOWNLOAD_OPTIONS = { FILENAME = "{{filename}}_{{timestamp}}.svg", FOLDER = "", REMOVE_USELESS_CLASSES = true, REMOVE_FOREIGN_OBJECT = false, PADDING_HORIZONTAL = 25, PADDING_VERTICAL = 25, IMAGE_SCALE = 2, IMAGE_QUALITY = 0.92, KEEP_ALPHA_CHANNEL = true, BACKGROUND_COLOR = "#FFFFFF", TEXT_COLOR = "#333333", OPEN_CIRCLE_COLOR = "#FFFFFF", SHOW_PATH_INQUIRY_DIALOG = true, SHOW_IN_FINDER = true }

# =========== [ Fence MindMap (Code Block) ] ===========
# Enable Fence Markmap (If false, all Fence-related configurations below are disabled)
ENABLE_FENCE_MARKMAP = true

# Hotkey to rapidly insert a Markmap code block
FENCE_HOTKEY = ""

# Designated language alias for Markmap code block
FENCE_LANGUAGE = "markmap"

# Interactive Mode: Prevents accidental mouse touches
INTERACTIVE_MODE = true

# Default structural height for the Fence Diagram
DEFAULT_FENCE_HEIGHT = "300px"

# Default background color for the Fence Diagram
DEFAULT_FENCE_BACKGROUND_COLOR = "#F8F8F8"

# Default Fence Options: Customize appearance and behavior
#   height         : structural height for the Fence Diagram
#   backgroundColor: background color for the Fence Diagram
#   Other Keys mirror DEFAULT_TOC_OPTIONS
DEFAULT_FENCE_OPTIONS = { duration = 500, initialExpandLevel = -1, maxInitialScale = 2, colorFreezeLevel = 7, zoom = false, pan = false, toggleRecursively = false, maxWidth = 0, nodeMinHeight = 16, spacingHorizontal = 80, spacingVertical = 5, paddingX = 8, fitRatio = 0.95, height = "300px", backgroundColor = "#F8F8F8", color = ["#1F77B4", "#FF7F0E", "#2CA02C", "#D62728", "#9467BD", "#8C564B", "#E377C2", "#7F7F7F", "#BCBD22", "#17BECF"] }

