# =====================================================================
# DO NOT EDIT THIS FILE
# =====================================================================
# This file contains the default settings for Typora-Plugin
# Any changes made to this file may be overwritten by future updates
#
# To customize your settings, please make changes in settings.user.toml
# =====================================================================

[global]
# =========== [ Basic ] ===========
# Master switch. Enables or disables the plugin system
ENABLE = true

# Locale
#   auto : System default
#   en   : English
#   zh-CN: 简体中文
#   zh-TW: 繁體中文
LOCALE = "auto"

# =========== [ Chart Interaction ] ===========
# Exit methods for chart interaction mode (e.g., kanban, markmap)
# Note: At least one exit method must be specified to prevent lock-in
#   click_exit_button: Click the [Edit] button in the top right corner of the chart area
#   ctrl_click_fence : Ctrl+Click the chart area
EXIT_CHART_INTERACTION = ["click_exit_button"]

# Batch render charts strategy
#   true : Batch render to improve performance
#   false: Render immediately without delay
BATCH_RENDER_CHARTS = false


[window_tab]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Appearance & Interaction ] ===========
# Trim file extension: Display only the filename on the tab (e.g., 'filename' instead of 'filename.md')
TRIM_FILE_EXT = true

# Show directory on duplicate: Display the parent directory on the tab when multiple open files share the same name (e.g., 'dir/filename.md')
SHOW_DIR_ON_DUPLICATE = true

# Show full path on hover: Display the complete file path in a tooltip when hovering over the tab
SHOW_FULL_PATH_ON_HOVER = true

# Show tab close button: Display the close (x) button on the right side of the tab
SHOW_TAB_CLOSE_BUTTON = true

# Hide window title bar: Applies only when Typora uses the unibody window style
HIDE_WINDOW_TITLE_BAR = false

# Min tab width: Min limit is 400px. Supports CSS units (e.g., "100px", "12em")
TAB_MIN_WIDTH = "100px"

# Max tab width: Max limit is 400px. Supports CSS units. Set to "none" for unlimited width
TAB_MAX_WIDTH = "200px"

# =========== [ Drag & Detachment ] ===========
# Drag style
#   JetBrains: Flexible reordering with detachment support
#   VSCode   : Simple and direct drag-and-drop
DRAG_STYLE = "JetBrains"

# Tab detachment mode (Requires DRAG_STYLE = "JetBrains")
#  free        : Unrestricted dragging
#  resistant   : Dragging with visual resistance
#  lockVertical: Prohibit vertical dragging
TAB_DETACHMENT = "resistant"

# Detachment threshold: Vertical drag distance less than X times the tab height is considered no vertical movement (Recommended: 0.5 ~ 1.5)
DETACHMENT_THRESHOLD = 1

# Drag threshold for new window: Vertical drag distance beyond X times the tab height opens it in a new window. Set to -1 to disable
DRAG_NEW_WINDOW_THRESHOLD = -1

# =========== [ Behavior & Mouse Interaction ] ===========
# Ctrl+Click: Open the file in a new window via Ctrl+Click on its tab
CTRL_CLICK_TO_NEW_WINDOW = true

# Wheel to scroll tab bar: Enable horizontal scrolling on the tab bar using the mouse wheel
WHEEL_TO_SCROLL_TAB_BAR = true

# Ctrl+Wheel to switch tabs: Quickly switch active tabs using Ctrl+Wheel
CTRL_WHEEL_TO_SWITCH = false

# Middle click to close tab: Close tabs using the middle mouse button
MIDDLE_CLICK_TO_CLOSE = true

# Max tab number: Auto-close the leftmost tab when exceeding this limit. Set to -1 for unlimited
MAX_TAB_NUM = -1

# New tab insertion position
#   start: Leftmost of the tab bar
#   end  : Rightmost of the tab bar
#   left : To the left of the current tab
#   right: To the right of the current tab
NEW_TAB_POSITION = "right"

# Tab to activate after closing the current one
#   left  : Activate the left tab
#   right : Activate the right tab
#   latest: Activate the most recently viewed tab
TAB_SWITCH_ON_CLOSE = "right"

# Behavior when closing the last tab
#   blankPage: Display a blank page (Falls back to 'reconfirm' on older Typora versions)
#   reconfirm: Prompt exit confirmation dialog
#   exit     : Exit Typora immediately
LAST_TAB_CLOSE_ACTION = "blankPage"

# Reopen unclosed tabs on startup: Restores tabs on next launch. Requires Typora's native setting "Open specific folder/Reopen last directory" to be enabled
REOPEN_TABS_ON_STARTUP = false

# =========== [ Hotkeys ] ===========
# Close current tab
CLOSE_HOTKEY = ["ctrl+w"]
# Switch to next tab
SWITCH_NEXT_TAB_HOTKEY = ["ctrl+PageDown", "ctrl+Tab"]
# Switch to previous tab
SWITCH_PREVIOUS_TAB_HOTKEY = ["ctrl+PageUp", "ctrl+shift+Tab"]
# Switch to last active tab
SWITCH_LAST_ACTIVE_TAB_HOTKEY = []
# Sort tabs by filename
SORT_TABS_HOTKEY = []
# Temporarily show/hide tab bar
TOGGLE_TAB_BAR_HOTKEY = []
# Copy current file path
COPY_PATH_HOTKEY = []

# =========== [ Context Menu ] ===========
# Context menu options for tabs. Set to [] to disable
#   closeTab       : Close tab
#   closeOtherTabs : Close other tabs
#   closeLeftTabs  : Close all tabs to the left
#   closeRightTabs : Close all tabs to the right
#   copyPath       : Copy current file path
#   showInFinder   : Show in File Explorer
#   openInNewWindow: Open in a new window
#   sortTabs       : Sort tabs by filename
CONTEXT_MENU = ["closeTab", "closeOtherTabs", "closeLeftTabs", "closeRightTabs", "sortTabs", "copyPath", "showInFinder", "openInNewWindow"]


[search_multi]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+p"

# =========== [ Window Interaction ] ===========
# Hide window when pressing Backspace on an empty input
BACKSPACE_TO_HIDE = false

# =========== [ Search ] ===========
# Case sensitive search
CASE_SENSITIVE = false

# Max directory traversal depth. Set to -1 for unlimited
MAX_DEPTH = -1

# Max concurrent search tasks: Prevents file handle exhaustion (EMFILE errors)
CONCURRENCY_LIMIT = 20

# Follow symbolic links during traversal. Note: High risk of infinite loops with circular symlinks
FOLLOW_SYMBOLIC_LINKS = false

# Stop searching on hiding window: Terminate active searches when the window is hidden to save resources
STOP_SEARCHING_ON_HIDING = true

# Max execution time (ms): Prevents search deadlocks. Set to -1 for unlimited
TIMEOUT = 60000

# Traverse strategy
#   bfs: Breadth-First Search
#   dfs: Depth-First Search
TRAVERSE_STRATEGY = "bfs"

# Max entities: Automatically halt search after finding this number of items. Set to -1 for unlimited
MAX_ENTITIES = -1

# Max file size (bytes): Ignore files larger than this threshold. Typora limit is 2,000,000. Set to -1 for unlimited
MAX_SIZE = 2000000

# Allowed file extensions: Defaults to Typora's supported formats. Modifying is not recommended
ALLOW_EXT = ["", "md", "markdown", "mdown", "mmd", "text", "txt", "rmarkdown", "mkd", "mdwn", "mdtxt", "rmd", "mdtext", "apib"]

# Ignored folders
IGNORE_FOLDERS = [".git", ".idea", "node_modules"]

# =========== [ Result Display ] ===========
# Use relative path: Show relative paths instead of absolute paths in the search list
RELATIVE_PATH = true

# Show file extension: Display extensions (e.g., .md) after file titles
SHOW_EXT = true

# Show modified time: Display the modification time on hover
SHOW_MTIME = false

# Highlight colors: Background colors for keywords
HIGHLIGHT_COLORS = [
    "#BBEEFF", "#FFBBCC", "#88EE88", "#CCBBFF", "#FFEE88", "#FFFFA0", "#88CCCC", "#FFBB88", "#CCCCCC", "#FFAABB",
    "#99CCFF", "#FF99CC", "#66CC66", "#CC99FF", "#FFCC66", "#FFFF80", "#DD9966", "#AAAAAA", "#66AAAA", "#DD6699",
]

# Max highlights: Limit HTML rendering to preserve performance
MAX_HIGHLIGHTS = 5000

# Hide button hint: Remove tooltip text when hovering over tool buttons
HIDE_BUTTON_HINT = false

# =========== [ Advanced ] ===========
# Optimize Search (AST Reordering): Reorder search conditions using short-circuit evaluation. Prioritizes low-cost queries (e.g., size, mtime) over high-cost queries (e.g., content, h1)
# Note: Enabling this may alter the highlight color assignment order of keywords
OPTIMIZE_SEARCH = false


[commander]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Window Interaction ] ===========
# Hide window when pressing Backspace on an empty input
BACKSPACE_TO_HIDE = false

# =========== [ Command Display ] ===========
# Output display mode for shortcut-triggered commands
#   always: Always show output modal after execution
#   error : Show output modal only on error
#   silent: Silent execution, hide output
#   echo  : Stream output immediately (Ideal for long-running/streaming tasks)
QUICK_RUN_DISPLAY = "error"

# Output display mode for panel-triggered commands
#   always: Show output modal after completion
#   echo  : Stream output immediately
COMMIT_RUN_DISPLAY = "echo"

# =========== [ Built-in Commands ] ===========
# Predefined command list
#   name   : Unique identifier for the plugin menu
#   disable: Master switch for this specific command
#   shell  : Target shell (Supported: "cmd/bash", "powershell", "gitbash", "wsl")
#   hotkey : (Optional) Execution shortcut
#   cmd    : Execution string
# Built-in environment variables:
#   $f: Absolute path of the current file
#   $d: Directory of the current file
#   $m: Current mount directory in Typora's sidebar
BUILTIN = [
    { name = "Default", disable = false, shell = "cmd/bash", cmd = "" },
    { name = "Explorer", disable = false, shell = "powershell", cmd = "explorer $d" },
    { name = "VScode", disable = false, shell = "cmd/bash", cmd = "code $f" },
    { name = "Windows Terminal", disable = false, shell = "cmd/bash", cmd = "cd $d && wt" },
    { name = "Git Commit", disable = false, shell = "cmd/bash", cmd = 'cd $m && git add . && git commit -m "update"' },
    { name = "TotalCommander", disable = true, shell = "cmd/bash", cmd = "D:\\software\\TotalCMD_64bit_11.03\\TOTALCMD64.EXE /O /T /P=L /L=$f" },
]


[md_padding]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+b"

# =========== [ Ignore ] ===========
# Ignored words: Exact words where internal/adjacent padding spaces are bypassed (e.g., ["word1", "word2"])
IGNORE_WORDS = []

# Ignored patterns: Regex where matched content bypasses padding spaces
IGNORE_PATTERNS = [':[0-9a-z_\-]+?:', '<br\s*?/?>', '<u>.+?</u>', '<span style=".+?">.+?</span>']


[read_only]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+r"

# =========== [ Mode Toggle ] ===========
# Enter read-only mode automatically on Typora startup
READ_ONLY_DEFAULT = false

# =========== [ Interaction & Appearance ] ===========
# Disable expand on click: Prevent images and inline formulas from expanding on click
DISABLE_EXPAND_WHEN_READ_ONLY = true

# Auto collapse: Automatically collapse expanded images/formulas when clicking elsewhere
# Disabled if DISABLE_EXPAND_WHEN_READ_ONLY is true
AUTO_COLLAPSE_WHEN_READ_ONLY = true

# Directly open URLs via click (Standard mode requires Ctrl+Click)
CLICK_HYPERLINK_TO_OPEN_WHEN_READ_ONLY = false

# Disable context menu: Simplify context menu options to prevent misoperations
DISABLE_CONTEXT_MENU_WHEN_READ_ONLY = true

# Remain available menu keys: Core menu options to retain when the context menu is disabled (Use dev tools to find data-key attributes)
# Disabled if DISABLE_CONTEXT_MENU_WHEN_READ_ONLY is false
REMAIN_AVAILABLE_MENU_KEY = ["typora-plugin", "dev-tool", "copy-img"]

# Hint text: Status indicator displayed in the bottom right word count area
SHOW_TEXT = "ReadOnly"


[blur]
# =========== [ Basic ] ===========
# Note: This feature is unavailable on older versions of Typora
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Mode Toggle ] ===========
# Enter blur mode automatically on Typora startup
BLUR_DEFAULT = false

# =========== [ Blur Effects ] ===========
# Blur type
#   blur: Apply Gaussian blur to unfocused components
#   hide: Directly hide unfocused components
BLUR_TYPE = "blur"

# Restore visibility on hover: Auto-focus components on mouse hover (Disabled if BLUR_TYPE is "hide")
RESTORE_ON_HOVER = true

# Blur level (px, Disabled if BLUR_TYPE is "hide")
BLUR_LEVEL = 10


[dark]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Mode Toggle ] ===========
# Enter dark mode automatically on Typora startup
DARK_DEFAULT = false


[no_image]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Mode Toggle ] ===========
# Enter no-image mode automatically on Typora startup
NO_IMAGE_DEFAULT = false

# =========== [ Animation & Display ] ===========
# Restore visibility on hover: Temporarily reveal hidden images on mouse hover
SHOW_ON_HOVER = true

# Duration of image fade-in/out animations (ms)
TRANSITION_DURATION = 300

# Wait time before triggering image visibility animations (ms)
TRANSITION_DELAY = 0


[myopic_defocus]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Mode Toggle ] ===========
# Enter myopic defocus mode automatically on Typora startup
DEFOCUS_DEFAULT = false

# =========== [ Defoucs Parameters ] ===========
# Screen size: Physical diagonal size in inches
SCREEN_SIZE = 14

# Screen horizontal resolution (px)
SCREEN_RESOLUTION_X = 1920

# Screen vertical resolution (px)
SCREEN_RESOLUTION_Y = 1080

# Screen distance: Physical distance from the eye to the screen (cm)
SCREEN_DISTANCE = 40

# Effect strength: Percentage ratio. Recommended: 10% ~ 35%
EFFECT_STRENGTH = 10


[toolbar]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+j"

# =========== [ Window Appearance & Interaction ] ===========
# Hide window when pressing Backspace on an empty input
BACKSPACE_TO_HIDE = true

# Vertical position: Distance from the top of the page (0~100%)
TOOLBAR_TOP_PERCENT = 20

# Width relative to the page (0~100%)
TOOLBAR_WIDTH_PERCENT = 80

# =========== [ Search Strategy ] ===========
# Wait time after typing stops before triggering a search (ms, Short intervals recommended for memory-level search)
DEBOUNCE_INTERVAL = 70

# Default search tool: Fallback searcher when no matching prefix is detected
#   ""   : Disable default tool; requires explicit prefix matching
#   plu  : Search enabled plugins
#   tab  : Search currently open file tabs
#   his  : Search recently opened files
#   ops  : Search Typora's common operation commands
#   mode : Switch file modes (e.g., Source Code, Focus Mode)
#   theme: Search and change Typora themes
#   out  : Search current document outline
#   func : Search Typora functions
#   all  : Mixed search across all tools
DEFAULT_TOOL = "func"

# Enable negative search
#   true : Enable negative queries. The "-" prefix excludes a keyword
#   false: Disable negative queries. All keywords are inclusive
# Example 1: `plu multi -search`
#   true : Find plugins containing "multi", but EXCLUDING "search"
#   false: Find plugins containing BOTH "multi" and "-search"
# Example 2: `his close -win -mark label`
#   true : Find recent files containing "close" AND "label", but EXCLUDING "win" AND "mark"
#   false: Find recent files containing "close", "-win", "-mark", AND "label"
USE_NEGATIVE_SEARCH = true


[resize_image]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Modifier Keys ] ===========
# Mouse wheel modifier keys
#   TEMPORARY : Temporarily scale image size in the current view (e.g., "alt" = Alt+Wheel)
#   PERSISTENT: Persistently scale image size by converting Markdown images to HTML with explicit dimensions (e.g., "ctrl" = Ctrl+Wheel)
MODIFIER_KEY = { TEMPORARY = "alt", PERSISTENT = "" }

# =========== [ Boundaries & Alignment ] ===========
# Allow exceed limit: Permit images to scale beyond the parent container or screen viewport width
ALLOW_EXCEED_LIMIT = true

# Image alignment
#   center: Align center
#   left  : Align left
#   right : Align right
IMAGE_ALIGN = "center"

# Remember resize state: Retain proportional image sizing across document switches within the same Typora session
RECORD_RESIZE = true


[resize_table]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Table Resizing ] ===========
# Remove minimum cell width limit: Allow extreme compression of table column widths
REMOVE_MIN_CELL_WIDTH = true

# Drag threshold (px): Minimum mouse drag distance required to trigger table boundary adjustments
DRAG_THRESHOLD = 20

# Remember resize state: Retain table deformation state within the same Typora session
RECORD_RESIZE = true


[datatables]
# =========== [ Basic ] ===========
ENABLE = false
NAME = ""

# =========== [ Paging & Sorting ] ===========
# Enable paging: Paginate oversized table data
PAGING = true

# Page length: Default number of rows per page in paging mode
PAGE_LENGTH = 25

# Allow table to collapse height: Auto-shrink table container height when data rows are sparse
SCROLL_COLLAPSE = true

# Enable ordering: Support ascending/descending data sorting via clicking table headers
ORDERING = true

# Default order: Automatically apply sorting to the first column on initialization
DEFAULT_ORDER = false

# =========== [ Searching & Filtering ] ===========
# Enable searching: Display an instant content filter search box above the table
SEARCHING = true

# Case insensitive search
CASE_INSENSITIVE = true

# Enable regex search: Support advanced regex rules within the search box
REGEX = false


[markmap]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ TOC MindMap (Popup) ] ===========
# Enable TOC Markmap (If false, all TOC-related configurations below are disabled)
ENABLE_TOC_MARKMAP = true

# Hotkey to trigger the TOC MindMap popup window
TOC_HOTKEY = ""

# Enable context menu within the MindMap popup window
USE_CONTEXT_MENU = true

# Title bar buttons
#   download: Download
#   settings: Open settings
#   pinRight: Pin to right screen edge
#   pinTop  : Pin to top screen edge
#   fit     : Fit graphic to window
#   unfold  : Unfold graphic
#   expand  : Expand window
#   close   : Close window
TITLE_BAR_BUTTONS = ["close", "expand", "pinTop", "pinRight", "fit", "unfold", "settings", "download"]

# Click node to position: Smoothly scroll the Markdown document to the clicked header node
CLICK_TO_POSITION = true

# Viewport position ratio where the scrolled header stops (e.g., 0.2 means top 20% of the screen)
# Requires CLICK_TO_POSITION = true
POSITIONING_VIEWPORT_HEIGHT = 0.2

# Filter or auto-complete out-of-order nodes that violate Markdown specs (e.g., H1 followed directly by H3)
FIX_SKIPPED_LEVEL_HEADERS = true

# Strip visual styling markers (e.g., **bold**, `code`) from MindMap nodes
REMOVE_HEADER_STYLES = true

# Auto fit window size: Triggered on diagram data updates
AUTO_FIT_ON_UPDATE = true

# Auto fit window size: Triggered on node fold/expand actions
AUTO_FIT_WHEN_FOLD = true

# Preserve user fold states during diagram update/redraws
RETAIN_FOLD_STATE_ON_UPDATE = true

# (Experimental) Auto collapse paragraph: Synchronously fold document paragraph content when folding nodes (Requires 'collapse_paragraph' plugin)
AUTO_COLLAPSE_PARAGRAPH_ON_FOLD = false

# Initial window width (%)
WIDTH_PERCENT_WHEN_INIT = 90

# Initial window height (%)
HEIGHT_PERCENT_WHEN_INIT = 35

# Pinned top window height (%)
HEIGHT_PERCENT_WHEN_PIN_TOP = 30

# Pinned right window width (%)
WIDTH_PERCENT_WHEN_PIN_RIGHT = 50

# Preset color scheme arrays for rendering branches
CANDIDATE_COLOR_SCHEMES = [
    ["#B3E2CD", "#FDCDAC", "#CBD5E8", "#F4CAE4", "#E6F5C9", "#FFF2AE", "#F1E2CC", "#CCCCCC"],
    ["#66C2A5", "#FC8D62", "#8DA0CB", "#E78AC3", "#A6D854", "#FFD92F", "#E5C494", "#B3B3B3"],
