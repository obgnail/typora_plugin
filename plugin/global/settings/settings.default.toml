[slash_commands]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Trigger ] ===========
# Regex defining the trigger text (Must implement the named capture group 'kw')
# Default behavior: Matches text initiated by / or \, succeeded by alphanumeric characters, and not preceded by <
TRIGGER_REGEXP = '(?<!<)[\/\\](?<kw>\w*)$'

# Timing strategy for displaying the suggestion list after typing
#   on_input: Display list immediately upon input
#   debounce: Display list after a debounce delay
SUGGESTION_TIMING = "on_input"

# =========== [ Match & Order ] ===========
# Match Strategy
#   prefix: Prefix match. Requires complete typing from start (para -> Paragraph)
#   substr: Substring match. Interrupted matching allowed (graph -> Paragraph)
#   abbr  : Abbreviation match. Extract discontinuous abbreviation validation (pgh -> Paragraph)
MATCH_STRATEGY = "abbr"

# Command sorting order strategy
#   predefined   : Defined array sequence
#   lexicographic: Alphabetical sorting
#   length_based : String length sorting
#   earliest_hit : Earliest match sorting
ORDER_STRATEGY = "predefined"

# =========== [ Command Parameters ] ===========
# Commands differentiate into parameterless and parameterized types
#   Parameterless: /command
#   Parameterized: /command_param1_param2 (Delimited by FUNC_PARAM_SEPARATOR)

# Parameter separator (Recommended to retain the default value)
# If modified (e.g., to '-'), TRIGGER_REGEXP must also be updated to capture the new symbol
FUNC_PARAM_SEPARATOR = "_"

# =========== [ Presets Commands ] ===========
# Registry of preset slash commands
#   enable      : Enable this command
#   type        : Command category ('snippet' for Static Text, 'command' for Executable Logic, 'gen-snp' for Dynamic Text)
#   scope       : Execution context ('plain' for Plain Text, 'inline_math' for Inline Math)
#   icon        : Command Icon
#   hint        : Tooltip hint
#   keyword     : Trigger keyword (Required; restricted to alphanumeric characters)
