[templater]
# =========== [ Basic ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ Template Application Options ] ===========
# Automatically load and open the newly generated file within the editor
AUTO_OPEN = true

# =========== [ Custom Template Variables ] ===========
# Custom Variables registry for advanced template definitions
#   enable  : Enable this variable
#   name    : Unique identifier for the variable
#   callback: Function evaluating and returning the variable's value
TEMPLATE_VARIABLES = [
    { enable = false, name = "author", callback = "() => 'obgnail'" },
    { enable = false, name = "sum", callback = "(v1 = 100, v2 = 200) => v1 + v2" },
    { enable = false, name = "sumList", callback = "args => args.reduce((x, y) => x + y, 0)" },
    { enable = false, name = "contact", callback = "(...args) => args.join('-')" },
]

# =========== [ External Templates ] ===========
# Recursively scans up to 3 levels within these specified folders to import standard .md files as templates
TEMPLATE_FOLDERS = []

# =========== [ Template Variables Documentation ] ===========
# Using variables in templates strictly mirrors JavaScript function invocation, with two distinctions
#   1. Variables must be enclosed within double braces: myFunc(arg1, arg2) -> {{ myFunc(arg1, arg2) }}
#   2. Parentheses are optional for parameterless calls: {{ myFunc() }} equals {{ myFunc }}
#
# Execution examples for TEMPLATE_VARIABLES (Requires enable = true)
#   {{ author }}             Outputs obgnail
#   {{ sum }}                Outputs 300
#   {{ sum(1, 2) }}          Outputs 3
#   {{ sumList([3, 2]) }}    Outputs 5
#   {{ contact("a", "b") }}  Outputs a-b

# =========== [ Built-in Template Variables ] ===========
#   {{ formatDate(format, locale) }}          Formatted current datetime
#   {{ dateOffset(offset, format, locale) }}  Formatted date adjusted by offset
#   {{ date }}                 Current date. Equivalent to {{ formatDate('yyyy-MM-dd') }}
#   {{ time }}                 Current time. Equivalent to {{ formatDate('HH:mm:ss') }}
#   {{ datetime }}             Current datetime. Equivalent to {{ formatDate('yyyy-MM-dd HH:mm:ss') }}
#   {{ weekday }}              Current weekday. Equivalent to {{ formatDate('ddd') }}
#   {{ yesterday }}            Yesterday's date. Equivalent to {{ dateOffset(-1) }}
#   {{ tomorrow }}             Tomorrow's date. Equivalent to {{ dateOffset(1) }}
#   {{ timestamp }}            Current timestamp (ms)
#   {{ randomInt(min, max) }}  Random integer within range
#   {{ randomStr(length) }}    Random string of specified length
#   {{ title }}                Title of the newly created file
#   {{ filepath }}             Path of the newly created file
#   {{ folder }}               Directory containing the current file
#   {{ mountFolder }}          Current mount directory
#   {{ uuid }}                 UUID

# =========== [ Custom Templates ] ===========
# Built-in Template Registry
#   name: Menu display identifier
#   text: Output body content
[[templater.TEMPLATE]]
name = "Standard"
text = """---
title: {{title}}
date: {{date}}
tags:
---

"""
[[templater.TEMPLATE]]
name = "Diary"
text = """---
title: {{title}}
date: {{date}} {{weekday}}
---

"""
[[templater.TEMPLATE]]
name = "Article"
text = """---
created: {{datetime}}
aliases: {{title}}
description:
tags:
---
## Keywords



## Overview and Background



"""


