[resource_manager]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 窗口位置 ] ===========
# 弹窗左边框百分比定位
MODAL_LEFT_PERCENT = 5

# 弹窗宽度百分比
MODAL_WIDTH_PERCENT = 90

# 弹窗高度百分比
MODAL_HEIGHT_PERCENT = 70

# =========== [ 资源识别匹配 ] ===========
# 识别挂载的资源语法标准
#   markdown: 标准 `![alt](uri)`
#   html    : `<IMG>` 标签
RESOURCE_GRAMMARS = ["markdown", "html"]

# 判别资源文件的扩展名
RESOURCE_EXT = ["", ".jpg", ".jpeg", ".png", ".gif", ".svg", ".tiff", ".ico", ".webp", ".webm", ".bmp", ".mp3", ".mp4", ".ogg", ".image", ".jfif", ".gif!large", ".gif!small"]

# 判别文档的扩展名
MARKDOWN_EXT = [".md", ".markdown", ".mdown", ".mmd", ".rmarkdown", ".mkd", ".mdwn", ".mdtxt", ".rmd", ".mdtext"]

# =========== [ 遍历与控制策略 ] ===========
# 跳过扫描目录
IGNORE_FOLDERS = [".git", ".idea", "node_modules"]

# 最大子目录扫描下潜极值(小于 0 则无限制)
MAX_DEPTH = -1

# 最大同时处理任务数
CONCURRENCY_LIMIT = 20

# 跟随符号链接解析(若开启需注意防死循环)
FOLLOW_SYMBOLIC_LINKS = false

# 搜索任务强行中断超时阈值(毫秒)
TIMEOUT = 180000

# 文件遍历策略
#   bfs: 广度优先
#   dfs: 深度优先
TRAVERSE_STRATEGY = "bfs"

# 发现超量文件自动停止阈值(-1 表示无限制)
MAX_ENTITIES = -1


[asset_root_redirect]
# =========== [ 基础 ] ===========
# 注意：【文件 front matter 的 typora-root-url 参数】优先级高于此插件
ENABLE = false
NAME = ""

# =========== [ 目录重定向设定 ] ===========
# 本地资源路径重定向基础地址（若为空，则此插件失效）
# 支持绝对和相对路径
ROOT_PATH = "./"

# 忽略文件：命中此 Glob Pattern 表达式的文件将不会执行资源路径重定向
IGNORE_GLOB_FILES = ["**/node_modules", "**/.git", "**/.idea"]


[bookmark]
# =========== [ 基础 ] ===========
ENABLE = false
NAME = ""
HOTKEY = ""

# =========== [ 交互控制 ] ===========
# 左键修饰键：与鼠标左键结合触发书签标注 (如填写 "alt"，则 Alt+LClick 标注书签)
MODIFIER_KEY = "alt"

# 快捷操作时自动唤出书签列表界面
AUTO_POPUP_WINDOW = true


[templater]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 模板应用选项 ] ===========
# 应用模板并生成新文件后，自动在编辑器中打开
AUTO_OPEN = true

# =========== [ 自定义模板变量 ] ===========
# 自定义模板变量：高级配置项，允许通过 JS 定义全新的模板渲染变量
#   enable  : 启用
#   name    : 变量名 (全局唯一)
#   callback: 返回该变量结果的函数
TEMPLATE_VARIABLES = [
    { enable = false, name = "author", callback = "() => 'obgnail'" },
    { enable = false, name = "sum", callback = "(v1 = 100, v2 = 200) => v1 + v2" },
    { enable = false, name = "sumList", callback = "args => args.reduce((x, y) => x + y, 0)" },
    { enable = false, name = "contact", callback = "(...args) => args.join('-')" },
]

# =========== [ 外部模板配置 ] ===========
# 模板文件目录：除了内置配置外，还可以指定本地目录。插件会递归最多 3 层寻找 .md 文件作为模板导入
TEMPLATE_FOLDERS = []

# =========== [ 模板变量使用说明 ] ===========
# 模板中使用变量与 JavaScript 函数调用基本一致，差异如下
#   1. 前后需双大括号包裹：myFunc(arg1, arg2) => {{ myFunc(arg1, arg2) }}
#   2. 无实参可省略小括号：{{ myFunc() }} 等同于 {{ myFunc }}
#
# 自定义变量 TEMPLATE_VARIABLES 的调用示例 (需设置 enable = true)
#   {{ author }}             输出 obgnail
#   {{ sum }}                输出 300
#   {{ sum(1, 2) }}          输出 3
#   {{ sumList([3, 2]) }}    输出 5
#   {{ contact("a", "b") }}  输出 a-b

# =========== [ 内置的模板变量 ] ===========
#   {{ formatDate(format, locale) }}          当前格式化日期时间
#   {{ dateOffset(offset, format, locale) }}  指定偏移量后的日期
#   {{ date }}                 当前日期。等同于 {{ formatDate('yyyy-MM-dd') }}
#   {{ time }}                 当前时间。等同于 {{ formatDate('HH:mm:ss') }}
#   {{ datetime }}             当前日期时间。等同于 {{ formatDate('yyyy-MM-dd HH:mm:ss') }}
#   {{ weekday }}              当前周几。等同于 {{ formatDate('ddd') }}
#   {{ yesterday }}            昨天日期。等同于 {{ dateOffset(-1) }}
#   {{ tomorrow }}             明天日期。等同于 {{ dateOffset(1) }}
#   {{ timestamp }}            当前时间戳 (毫秒)
#   {{ randomInt(min, max) }}  范围内随机整数
#   {{ randomStr(length) }}    指定长度随机字符串
#   {{ title }}                新建文件标题
#   {{ filepath }}             新建文件路径
#   {{ folder }}               当前文件目录
#   {{ mountFolder }}          当前挂载目录
#   {{ uuid }}                 UUID

# =========== [ 自定义模板列表 ] ===========
# 自定义模板：配置多套文字模板
#   name: 名称 (显示在菜单中)
#   text: 模板本体内容 (支持调用上述的变量如 {{date}}、{{title}} 等)
[[templater.TEMPLATE]]
name = "Standard"
text = """---
title: {{title}}
date: {{date}}
tags:
---

"""
[[templater.TEMPLATE]]
name = "Diary"
text = """---
title: {{title}}
date: {{date}} {{weekday}}
---

"""
[[templater.TEMPLATE]]
name = "Article"
text = """---
created: {{datetime}}
aliases: {{title}}
description:
tags:
---
## Keywords



## Overview and Background



"""


