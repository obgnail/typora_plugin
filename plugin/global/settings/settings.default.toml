# =========== [ Basic ] ===========
ENABLE = true
NAME = ""

# =========== [ Buttons ] ===========
# Master switch: Inject floating utility buttons into the top-right corner of code blocks
ENABLE_BUTTON = true

# Button size
BUTTON_SIZE = "1.2em"

# Button color
BUTTON_COLOR = "currentColor"

# Button padding
BUTTON_PADDING = "0.2em"

# Button distance from top edge
BUTTON_TOP = "0.3em"

# Button distance from right edge
BUTTON_RIGHT = "0.5em"

# Button initial opacity (0.0 ~ 1.0)
BUTTON_OPACITY = 0.5

# Button hover opacity (0.0 ~ 1.0)
BUTTON_OPACITY_HOVER = 0.8

# Disable tooltip hint text on hover
HIDE_BUTTON_HINT = false

# Show buttons exclusively when the cursor enters the code block bounds
AUTO_HIDE = false

# =========== [ Copy / Indent / Fold ] ===========
# Enable [Copy] button (Requires ENABLE_BUTTON = true)
# If false, TRIM_WHITESPACE_ON_COPY, LINE_BREAKS_ON_COPY, COPY_AS_MARKDOWN are disabled
ENABLE_COPY = true

# Strip trailing and leading whitespace on copy
TRIM_WHITESPACE_ON_COPY = false

# Line break normalization on copy
#   lf      : Convert to LF
#   crlf    : Convert to CRLF
#   preserve: Keep as is
LINE_BREAKS_ON_COPY = "preserve"

# Copy format toggle
#   true : Copy as Markdown
#   false: Copy as plain text
COPY_AS_MARKDOWN = false

# Enable [Indent] button: One-click hierarchical auto-formatting (Note: Poor compatibility on older Typora versions)
ENABLE_INDENT = true

# Bypass auto-formatting logic for specific code languages to prevent syntax breakage
EXCLUDE_LANGUAGE_ON_INDENT = ["python", "ruby", "yaml", "yml"]

# Enable [Fold] button
ENABLE_FOLD = true

# Manual fold retained lines: Visible preview lines when explicitly collapsed
MANUAL_FOLD_LINES = 5

# Auto fold retained lines: Visible preview lines when automatically collapsed
AUTO_FOLD_LINES = 5

# Fold overflow behavior
#   hidden: Truncate hidden content completely
#   scroll: Append internal scrollbar for remaining content
FOLD_OVERFLOW = "scroll"

# Auto-collapse code blocks immediately on render
# If false, DEFAULT_FOLD_THRESHOLD, EXPAND_ON_FOCUS, FOLD_ON_BLUR are disabled
DEFAULT_FOLD = false

# Default fold threshold: Code blocks exceeding this line count will trigger auto-collapse (0 means fold all)
DEFAULT_FOLD_THRESHOLD = 10

# Expand on focus: Temporarily auto-unfold code block when it receives cursor focus
# Note: Affected by DEFAULT_FOLD_THRESHOLD; will not fold if the threshold is not reached
EXPAND_ON_FOCUS = false

# Fold on blur: Auto-collapse expanded code blocks when losing cursor focus
FOLD_ON_BLUR = false

# Feedback overlay retention time (ms) for success visual cues (e.g., check mark after copying)
HINT_DURATION = 1000

# =========== [ Custom Buttons ] ===========
# Register custom buttons on code blocks (Advanced JS Config)
#   DISABLE  : Master switch to disable
#   ICON     : FontAwesome CSS class
#   HINT     : Hover tooltip text
#   ON_INIT  : Init function evaluated once per plugin load. Empty "" if not needed. Example: plu => console.log('initialized')
#   ON_RENDER: Render function evaluated on every code block render. Empty "" if not needed. Example: ({ btn, fence, cid, enhance }) => console.log('rendered')
#   ON_CLICK : Callback logic executed on click (Required). Example: ({ ev, btn, cont, fence, cm, cid, plu }) => console.log('clicked')
CUSTOM_BUTTONS = []

# =========== [ Hotkeys ] ===========
# Takeover code block hotkeys via CodeMirror built-in dispatcher
# Requires careful conflict checks against built-in hotkeys below
#   Ctrl-A        : selectAll
#   Ctrl-Up       : goDocStart
#   Ctrl-Down     : goDocEnd
#   Ctrl-Left     : goGroupLeft
#   Ctrl-Right    : goGroupRight
#   Alt-Left      : goLineStart
#   Alt-Right     : goLineEnd
#   Ctrl-Backspace: delGroupBefore
#   Ctrl-Delete   : delGroupAfter
#   Ctrl-[        : indentLess
#   Ctrl-]        : indentMore
#   Ctrl-U        : undoSelection
#   Shift-Ctrl-U  : redoSelection
#   Alt-U         : redoSelection
ENABLE_HOTKEY = true

# Swap line with previous line
SWAP_PREVIOUS_LINE = "Shift-Alt-Up"

# Swap line with next line
SWAP_NEXT_LINE = "Shift-Alt-Down"

# Duplicate and copy to previous line
COPY_PREVIOUS_LINE = "Ctrl-Alt-Up"

# Duplicate and copy to next line
COPY_NEXT_LINE = "Ctrl-Alt-Down"

# Insert blank line above current cursor
INSERT_LINE_PREVIOUS = "Shift-Ctrl-Enter"

# Insert blank line below current cursor
INSERT_LINE_NEXT = "Ctrl-Enter"

# Custom hotkey payload mappings (Advanced JS Config)
#   DISABLE : Master switch to disable
#   HOTKEY  : CodeMirror shortcut format
#   CALLBACK: Execution logic function. Example: ({ pre, cid, cm, cursor, lineNum, lastNum, separator }) => console.log('callback')
CUSTOM_HOTKEYS = []

# =========== [ Code Folding & Highlighting ] ===========
# Auto-inject code level fold symbols based on language features
ENABLE_LANGUAGE_FOLD = true

# Support VitePress-style inline line highlight syntax
# Example: ```js{2, 5-8} will highlight specific lines dynamically
# See: https://vitepress.dev/guide/markdown#line-highlighting-in-code-blocks
HIGHLIGHT_BY_LANGUAGE = false

# Line numbering base
#   1-based: Starts from 1
#   0-based: Starts from 0
NUMBERING_BASE = "1-based"

# Highlight metadata regex capture pattern
HIGHLIGHT_PATTERN = '^(?<lang>[^{}]+){(?<line>[\d\s,-]+)}$'

# Render background color for language-based line highlights
HIGHLIGHT_LINE_COLOR_BY_LANGUAGE = "rgba(142, 150, 170, 0.14)"

# Highlight code line on hover
HIGHLIGHT_ON_HOVER = false

# Highlight line background color on hover
HIGHLIGHT_LINE_COLOR_ON_HOVER = "rgba(142, 150, 170, 0.14)"

# Highlight code line on cursor focus
HIGHLIGHT_ON_FOCUS = false

# Highlight line background color on cursor focus
HIGHLIGHT_LINE_COLOR_ON_FOCUS = "rgba(142, 150, 170, 0.14)"

# =========== [ Advanced ] ===========
# Auto-align wrapped lines: Maintain proper indentation for long, wrapped text lines. Note: High rendering performance cost
# See: https://github.com/codemirror/codemirror5/issues/2085
INDENTED_WRAPPED_LINE = false

# Force immediate rendering of all code blocks regardless of viewport. Use with extreme caution (Induces heavy lag)
