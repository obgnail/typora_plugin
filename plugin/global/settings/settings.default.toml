[slash_commands]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""

# =========== [ 触发命令候选框 ] ===========
# 触发文本的正则表达式 (需使用命名捕获组 kw)
#   默认值：匹配一个文本，以 / 或 \ 开头，紧跟任意数量字母/数字，且前面不能有 <
TRIGGER_REGEXP = '(?<!<)[\/\\](?<kw>\w*)$'

# 键入触发文本后显示策略
#   on_input: 立即显示
#   debounce: 延迟防抖显示
SUGGESTION_TIMING = "on_input"

# =========== [ 匹配与排序策略 ] ===========
# 匹配策略
#   prefix: 前缀匹配。需完整从头起打 (para -> Paragraph)
#   substr: 子串匹配。中断允许匹配 (graph -> Paragraph)
#   abbr  : 缩写匹配。抽取断续缩写验证 (pgh -> Paragraph)
MATCH_STRATEGY = "abbr"

# 排序策略
#   predefined   : 预定义
#   lexicographic: 字典序
#   length_based : 长度序
#   earliest_hit : 最早命中
ORDER_STRATEGY = "predefined"

# =========== [ 命令参数与预设 ] ===========
# 命令分为无参和带参两种
#   无参形式: /command
#   带参形式: /command_param1_param2 (用下方 FUNC_PARAM_SEPARATOR 分隔)

# 命令参数分离标识符：强烈建议保持默认
# 若执意修改(如改为中划线-)，必须同步修改上方 TRIGGER_REGEXP 使之支持该符号
FUNC_PARAM_SEPARATOR = "_"

# 预设命令：斜杠命令配置列表
#   enable      : 启用
#   type        : 类型 (snippet: 插入文字片段; command: 执行逻辑命令; gen-snp: 插入动态文字片段)
