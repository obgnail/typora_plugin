#   COLLAPSE_SIBLINGS     : Fold/Expand all sibling sections under parent
#   COLLAPSE_ALL_SIBLINGS : Fold/Expand all sibling sections in current file
#   COLLAPSE_RECURSIVE    : Recursively fold/expand current section
# Avoid "alt" (used by Bookmark plugin) and "shift" (used by OS selection)
