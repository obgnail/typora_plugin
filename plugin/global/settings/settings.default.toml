[collapse_paragraph]
# =========== [ 基础 ] ===========
# 此插件与 Typora 原生配置【显示当前块元素的 Markdown 源码】冲突。开启此插件将自动关闭该原生配置
ENABLE = false
NAME = ""

# =========== [ 严格模式 ] ===========
# 严格模式：仅明确点击或作用于 H1~H6 组件时触发；非严格会向上自动溯源找最近父级标题
STRICT_MODE = true

# =========== [ 右键菜单严格模式 ] ===========
# 右键菜单严格模式：菜单仅在真正位于标题层时允许调用
STRICT_MODE_IN_CONTEXT_MENU = false

# =========== [ 状态记忆 ] ===========
# 运行期间在内存池跨标签保存被折叠段落历史
RECORD_COLLAPSE = true

# =========== [ 修饰键组合设定 ] ===========
# Ctrl/Alt/Shift 键混搭鼠标左击行为，为不同折叠/展开功能设置修饰键
#   1. 支持任意组合，如 "shift+alt", "ctrl+shift"
#   2. 避免 "alt"（被书签插件占用）和 "shift"（被系统框选占用）
#   3. 为空表示不启用
#   4. 示例：COLLAPSE_SIBLINGS = "ctrl+alt"，按住 Ctrl+Alt 点击标题折叠/展开同级章节
# 功能映射
#   COLLAPSE_SINGLE       : 折叠/展开 单个章节
#   COLLAPSE_SIBLINGS     : 折叠/展开 父章节下所有同级的章节
#   COLLAPSE_ALL_SIBLINGS : 折叠/展开 当前文件所有同级的章节
#   COLLAPSE_RECURSIVE    : 递归折叠/展开 当前章节
MODIFIER_KEY = { COLLAPSE_SINGLE = "ctrl", COLLAPSE_SIBLINGS = "ctrl+alt", COLLAPSE_ALL_SIBLINGS = "ctrl+shift+alt", COLLAPSE_RECURSIVE = "" }


