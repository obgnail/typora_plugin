# =====================================================================
# DO NOT EDIT THIS FILE
# =====================================================================
# This file contains the default settings for Typora-Plugin
# Any changes made to this file may be overwritten by future updates
#
# To customize your settings, please make changes in settings.user.toml
# =====================================================================

[global]
# =========== [ 基础 ] ===========
# 启用插件（总开关）
ENABLE = true

# 语言
#   auto : 自动检测
#   en   : English
#   zh-CN: 简体中文
#   zh-TW: 繁體中文
LOCALE = "auto"

# =========== [ 图表交互 ] ===========
# 退出图表交互模式：使用图表插件（如 kanban, markmap 等）并开启交互模式时，定义退出状态的方式
# 至少填写一个退出方式，否则陷入交互模式无法退出
#   click_exit_button: 点击图表区域右上角的【编辑】按钮退出
#   ctrl_click_fence : 按住 Ctrl 键并点击图表区域退出
EXIT_CHART_INTERACTION = ["click_exit_button"]

# 合并渲染图形代码块
#   true : 合并渲染，提升渲染性能
#   false: 立即渲染，无延迟
BATCH_RENDER_CHARTS = false


[window_tab]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""

# =========== [ 标签页外观与交互 ] ===========
# 隐藏文件扩展名：标签标题仅显示文件名 (如: filename.md 显示为 filename)
TRIM_FILE_EXT = true

# 同名文件显示目录：打开多个同名文件时，显示文件的父目录以便区分 (如: filename.md 显示为 dir/filename.md)
SHOW_DIR_ON_DUPLICATE = true

# Hover 显示文件路径：鼠标悬停在标签页上时，显示完整的文件路径
SHOW_FULL_PATH_ON_HOVER = true

# 显示关闭按钮：在标签页右侧显示关闭 (x) 按钮
SHOW_TAB_CLOSE_BUTTON = true

# 隐藏窗口标题栏：当 Typora 使用一体化窗口样式时生效
HIDE_WINDOW_TITLE_BAR = false

# 标签页最小宽度：最大限制 400px，支持 CSS 单位 (如 "100px", "12em")
TAB_MIN_WIDTH = "100px"

# 标签页最大宽度：最大限制 400px，支持 CSS 单位 ("none" 表示不限制)
TAB_MAX_WIDTH = "200px"

# =========== [ 标签页拖拽与分离 ] ===========
# 标签页拖拽风格
#   JetBrains: 灵活调整顺序，支持分离模式
#   VSCode   : 简单直接的拖拽方式
DRAG_STYLE = "JetBrains"

# 标签页分离行为：仅当拖拽风格为 JetBrains 时生效
#  free        : 自由拖拽无限制
#  resistant   : 存在拖动阻力
#  lockVertical: 禁止竖直移动
TAB_DETACHMENT = "resistant"

# 分离阈值：拖拽垂直距离少于 X 倍标签页高度时，视为无垂直移动 (推荐 0.5 ~ 1.5)
DETACHMENT_THRESHOLD = 1

# 新建窗口阈值：向下拖拽标签页垂直距离超过其高度的 X 倍时，在新窗口中打开 (-1 表示不启用此功能)
DRAG_NEW_WINDOW_THRESHOLD = -1

# =========== [ 标签页行为与鼠标交互 ] ===========
# Ctrl+Click：按住 Ctrl 并点击标签页，在新窗口中打开该文件
CTRL_CLICK_TO_NEW_WINDOW = true

# Wheel 滚动标签栏：支持鼠标滚轮在标签栏上横向滚动
WHEEL_TO_SCROLL_TAB_BAR = true

# Ctrl+Wheel 切换标签页：支持通过组合键快速切换激活的标签页
CTRL_WHEEL_TO_SWITCH = false

# Middle Click 关闭标签页：支持通过鼠标中键直接关闭标签页
MIDDLE_CLICK_TO_CLOSE = true

# 标签页最大数量：超出时自动关闭最左侧标签页 (-1 表示无限制)
MAX_TAB_NUM = -1

# 新建标签页位置
#   start: 标签栏最左侧
#   end  : 标签栏最右侧
#   left : 当前标签页左侧
#   right: 当前标签页右侧
NEW_TAB_POSITION = "right"

# 关闭标签页后激活位置
#   left  : 激活左侧标签页
#   right : 激活右侧标签页
#   latest: 激活最近浏览的标签页
TAB_SWITCH_ON_CLOSE = "right"

# 关闭最后的标签页后的行为
#   blankPage: 显示空白页 (低版本 Typora 回退到 reconfirm)
#   reconfirm: 弹出确认退出对话框
#   exit     : 直接退出 Typora
LAST_TAB_CLOSE_ACTION = "blankPage"

# 启动时恢复未关闭标签页：仅在双击 typora.exe 启动，且原生配置为“打开指定目录/重新打开上次使用的目录”时生效
REOPEN_TABS_ON_STARTUP = false

# =========== [ 快捷键 ] ===========
# 关闭当前标签页
CLOSE_HOTKEY = ["ctrl+w"]
# 切换到下一个标签页
SWITCH_NEXT_TAB_HOTKEY = ["ctrl+PageDown", "ctrl+Tab"]
# 切换到上一个标签页
SWITCH_PREVIOUS_TAB_HOTKEY = ["ctrl+PageUp", "ctrl+shift+Tab"]
# 切换到上一个活动标签页
SWITCH_LAST_ACTIVE_TAB_HOTKEY = []
# 按照文件名对标签页进行排序
SORT_TABS_HOTKEY = []
# 临时显示/隐藏标签栏
TOGGLE_TAB_BAR_HOTKEY = []
# 复制当前文件路径
COPY_PATH_HOTKEY = []

# =========== [ 右键菜单 ] ===========
# 标签页右键菜单选项列表 (置为空数组 [] 则禁用右键菜单)
#   closeTab       : 关闭标签页
#   closeOtherTabs : 关闭其他标签页
#   closeLeftTabs  : 关闭当前标签页左侧的所有标签页
#   closeRightTabs : 关闭当前标签页右侧的所有标签页
#   copyPath       : 复制当前文件路径
#   showInFinder   : 在文件资源管理器中打开文件所在位置
#   openInNewWindow: 在新窗口中打开当前文件
#   sortTabs       : 按照文件名排序标签页
CONTEXT_MENU = ["closeTab", "closeOtherTabs", "closeLeftTabs", "closeRightTabs", "sortTabs", "copyPath", "showInFinder", "openInNewWindow"]


[search_multi]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+p"

# =========== [ 窗口交互 ] ===========
# 输入框为空，且键入 Backspace 时，隐藏窗口
BACKSPACE_TO_HIDE = false

# =========== [ 搜索 ] ===========
# 搜索区分大小写
CASE_SENSITIVE = false

# 最大子目录深度：遍历文件夹时的层级限制 (-1 表示无限制)
MAX_DEPTH = -1

# 最大同时处理任务数：控制并发，防止过多文件句柄导致 EMFILE 错误
CONCURRENCY_LIMIT = 20

# 跟随符号链接：若开启需注意闭环目录导致的无限循环问题
FOLLOW_SYMBOLIC_LINKS = false

# 隐藏窗口后立即停止搜索：避免后台持续消耗系统资源
STOP_SEARCHING_ON_HIDING = true

# 最大执行时间 (毫秒)：防止搜索死锁 (-1 表示不限制)
TIMEOUT = 60000

# 文件遍历策略
#   bfs: 广度优先
#   dfs: 深度优先
TRAVERSE_STRATEGY = "bfs"

# 最大文件数量：超出数量时搜索自动停止 (-1 表示无限制)
MAX_ENTITIES = -1

# 最大文件大小 (字节)：大于此值的文件将被忽略 (Typora 上限为 2,000,000 字节，-1 表示不限制)
MAX_SIZE = 2000000

# 允许搜索的文件扩展名：默认为 Typora 支持的所有扩展名，不推荐随意增加
ALLOW_EXT = ["", "md", "markdown", "mdown", "mmd", "text", "txt", "rmarkdown", "mkd", "mdwn", "mdtxt", "rmd", "mdtext", "apib"]

# 忽略搜索的文件夹：直接排除常见的编译、缓存及配置目录
IGNORE_FOLDERS = [".git", ".idea", "node_modules"]

# =========== [ 结果展示与高亮 ] ===========
# 使用相对路径：在搜索列表中显示相对路径而非绝对路径
RELATIVE_PATH = true

# 显示文件扩展名：在文件标题后展示如 .md 等后缀
SHOW_EXT = true

# 显示文件修改时间：鼠标悬停在搜索结果项上时显示
SHOW_MTIME = false

# 关键字高亮色：数组按顺序匹配多个关键字的底色展示
HIGHLIGHT_COLORS = [
    "#BBEEFF", "#FFBBCC", "#88EE88", "#CCBBFF", "#FFEE88", "#FFFFA0", "#88CCCC", "#FFBB88", "#CCCCCC", "#FFAABB",
    "#99CCFF", "#FF99CC", "#66CC66", "#CC99FF", "#FFCC66", "#FFFF80", "#DD9966", "#AAAAAA", "#66AAAA", "#DD6699",
]

# 高亮最大数量：渲染过多 HTML 会影响性能
MAX_HIGHLIGHTS = 5000

# 隐藏按钮提示：去掉鼠标悬停在工具按钮上时弹出的文字提示
HIDE_BUTTON_HINT = false

# =========== [ 高级 ] ===========
# 搜索优化 (AST Reordering)：自动重组搜索条件，利用短路求值将低开销查询 (如 size, mtime) 前置，高开销查询 (如 h1, content) 后置
# 注意开启后可能改变关键字的高亮颜色分配顺序
OPTIMIZE_SEARCH = false


[commander]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 窗口行为 ] ===========
# 输入框为空，且键入 Backspace 时，隐藏窗口
BACKSPACE_TO_HIDE = false

# =========== [ 命令显示 ] ===========
# 快捷方式执行命令的回显方式 (通过菜单/快捷键直接执行的命令)
#   always: 执行结束后弹窗并显示输出
#   error : 仅在错误时弹窗并显示输出
#   silent: 静默执行，不显示任何输出
#   echo  : 立即弹窗并回显输出 (适合耗时/流式任务)
QUICK_RUN_DISPLAY = "error"

# 命令框执行命令的回显方式 (通过输入框回车执行的命令)
#   always: 执行结束后显示输出
#   echo  : 立即回显输出
COMMIT_RUN_DISPLAY = "echo"

# =========== [ 预设命令列表 ] ===========
# 预设的常用命令列表，每个命令项包含以下属性
#   name   : 命令的显示名称，必须唯一，用于在插件菜单中标识此命令
#   disable: 是否禁用此命令，true 为禁用，false 为启用
#   shell  : 指定命令执行的 shell 环境，支持 "cmd/bash", "powershell", "gitbash", "wsl"
#   hotkey : (可选) 为此命令设置的快捷键，用于快速执行此命令
#   cmd    : 实际要执行的命令
# 内置环境变量
#   $f: 当前编辑文件的完整路径
#   $d: 当前编辑文件所在的目录路径
#   $m: 当前 Typora 侧边栏的挂载根目录
BUILTIN = [
    { name = "Default", disable = false, shell = "cmd/bash", cmd = "" },
    { name = "Explorer", disable = false, shell = "powershell", cmd = "explorer $d" },
    { name = "VScode", disable = false, shell = "cmd/bash", cmd = "code $f" },
    { name = "Windows Terminal", disable = false, shell = "cmd/bash", cmd = "cd $d && wt" },
    { name = "Git Commit", disable = false, shell = "cmd/bash", cmd = 'cd $m && git add . && git commit -m "update"' },
    { name = "TotalCommander", disable = true, shell = "cmd/bash", cmd = "D:\\software\\TotalCMD_64bit_11.03\\TOTALCMD64.EXE /O /T /P=L /L=$f" },
]


[md_padding]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+b"

# =========== [ 忽略词组与正则过滤 ] ===========
# 忽略词组：指定的词组内部及前后不添加多余空格 (如 ["word1", "词组1"])
IGNORE_WORDS = []

# 忽略正则表达式：匹配的模式内部及前后不处理
IGNORE_PATTERNS = [':[0-9a-z_\-]+?:', '<br\s*?/?>', '<u>.+?</u>', '<span style=".+?">.+?</span>']


[read_only]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+shift+r"

# =========== [ 交互控制与外观 ] ===========
# 默认开启：启动 Typora 时自动进入只读模式
READ_ONLY_DEFAULT = false

# 禁用单击展开：只读模式下，禁止通过点击图片和行内公式自动放大
DISABLE_EXPAND_WHEN_READ_ONLY = true

# 自动收缩：只读模式下，点击页面其他区域自动将已展开的图片/公式收回
# 当 DISABLE_EXPAND_WHEN_READ_ONLY 为 true 时失效
AUTO_COLLAPSE_WHEN_READ_ONLY = true

# 单击跳转超链接：开启后，左键单击即可打开网址 (普通模式需按住 Ctrl 点击)
CLICK_HYPERLINK_TO_OPEN_WHEN_READ_ONLY = false

# 禁用右键菜单：只读模式下精简右键菜单选项以防误操作
DISABLE_CONTEXT_MENU_WHEN_READ_ONLY = true

# 保持可用的菜单：禁用右键菜单时，保留在页面上的核心菜单功能 Key 列表
# 可选值需打开调试工具查找 data-key 属性
# REMAIN_AVAILABLE_MENU_KEY 为 false 时失效
REMAIN_AVAILABLE_MENU_KEY = ["typora-plugin", "dev-tool", "copy-img"]

# 状态指示提示：右下角数字统计区域显示的提示字眼
SHOW_TEXT = "ReadOnly"


[blur]
# =========== [ 基础 ] ===========
# 注意：此插件无法在低版本 Typora 上使用
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 插件默认行为 ] ===========
# 默认开启：启动 Typora 时自动进入模糊模式
BLUR_DEFAULT = false

# =========== [ 模糊效果 ] ===========
# 模糊类型
#   blur: 未聚焦的组件表现为高斯模糊
#   hide: 未聚焦的组件直接隐藏
BLUR_TYPE = "blur"

# 悬停恢复可见：鼠标移动到未聚焦组件上时自动展示其内容 (BLUR_TYPE 为 hide 时失效)
RESTORE_ON_HOVER = true

# 模糊等级：px 像素值，数值越大模糊越深 (BLUR_TYPE 为 hide 时失效)
BLUR_LEVEL = 10


[dark]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 夜间模式切换 ] ===========
# 默认开启：启动 Typora 时自动进入夜间模式
DARK_DEFAULT = false


[no_image]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 无图模式切换 ] ===========
# 默认开启：启动 Typora 时自动进入无图模式
NO_IMAGE_DEFAULT = false

# =========== [ 动画与显示控制 ] ===========
# 悬停恢复可见：鼠标滑过隐藏的图片区域时临时显示图片
SHOW_ON_HOVER = true

# 过渡动画时间：图片淡入淡出动画的持续时间 (毫秒)
TRANSITION_DURATION = 300

# 过渡动画延迟：图片触发显隐操作前的等待时间 (毫秒)
TRANSITION_DELAY = 0


[myopic_defocus]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = ""

# =========== [ 屏幕参数与效果配置 ] ===========
# 默认开启：启动 Typora 时即启动近视离焦舒缓滤镜
DEFOCUS_DEFAULT = false

# 屏幕尺寸：物理对角线尺寸 (英寸)
SCREEN_SIZE = 14

# 水平分辨率 (px)
SCREEN_RESOLUTION_X = 1920

# 垂直分辨率 (px)
SCREEN_RESOLUTION_Y = 1080

# 观看距离：人眼到屏幕的物理距离 (厘米)
SCREEN_DISTANCE = 40

# 效果强度：百分比，推荐 10% ~ 35%
EFFECT_STRENGTH = 10


[toolbar]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""
HOTKEY = "ctrl+j"

# =========== [ 窗口外观与交互 ] ===========
# 输入框为空且键入退格键 (Backspace) 时，自动隐藏搜索栏
BACKSPACE_TO_HIDE = true

# 垂直定位：搜索栏距离页面顶部的百分比位置 (0~100)
TOOLBAR_TOP_PERCENT = 20

# 宽度：搜索栏占据页面宽度的百分比尺寸 (0~100)
TOOLBAR_WIDTH_PERCENT = 80

# =========== [ 搜索策略控制 ] ===========
# 输入防抖时间 (毫秒)：停止输入多少毫秒后触发检索 (内存级检索推荐短时间)
DEBOUNCE_INTERVAL = 70

# 默认搜索工具：无匹配前缀时的回退检索器
#   ""   : 不使用默认工具，只显示匹配的搜索工具
#   plu  : 插件搜索 (搜索已安装的插件)
#   tab  : 当前标签页搜索 (搜索当前打开的文件标签页)
#   his  : 最近文件搜索 (搜索最近打开过的文件)
#   ops  : 常用操作搜索 (搜索 Typora 的常用操作命令)
#   mode : 切换文件模式搜索 (搜索 Typora 的文件模式，如源码模式、专注模式)
#   theme: 切换主题搜索 (搜索 Typora 的主题)
#   out  : 文档大纲搜索 (搜索当前文档的大纲)
#   func : 功能列表搜索 (搜索 Typora 的所有功能)
#   all  : 混合搜索 (搜索所有可用项目，包括以上所有工具)
DEFAULT_TOOL = "func"

# 启用负向查询
#   true : 启用负向查询，使用 "-" 前缀表示排除关键字
#   false: 禁用负向查询，所有关键字都视为包含关系
# 例1：`plu multi -search`
#   true : 查找插件，要求插件名【包含multi，但不包含search】
#   false: 查找插件，要求插件名【包含multi和-search】
# 例2：`his close -win -mark 标签`
#   true : 查找近期文件，要求文件名【包含close、标签，但不包含win、mark】
#   false: 查找近期文件，要求文件名【包含close、-win、-mark、标签】
USE_NEGATIVE_SEARCH = true


[resize_image]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""

# =========== [ 缩放修饰键 ] ===========
# 缩放功能修饰键
#   TEMPORARY : 临时修改图片大小。例如填入 "alt"，按住 Alt 滚动滚轮仅在当前视图临时调整
#   PERSISTENT: 永久修改图片大小。例如填入 "ctrl"，缩放时自动将 Markdown 图片转换为 HTML 并持久化写入尺寸参数
MODIFIER_KEY = { TEMPORARY = "alt", PERSISTENT = "" }

# =========== [ 边界与对齐配置 ] ===========
# 允许超出边界：图片放大时允许突破父容器或屏幕视口的宽度限制
ALLOW_EXCEED_LIMIT = true

# 图片对齐方式
#   center: 居中对齐
#   left  : 左对齐
#   right : 右对齐
IMAGE_ALIGN = "center"

# 记忆放缩状态：不退出 Typora 的前提下，跨文档切换时记住已设定的图片尺寸比例
RECORD_RESIZE = true


[resize_table]
# =========== [ 基础 ] ===========
ENABLE = true
NAME = ""

# =========== [ 表格调整 ] ===========
# 移除单元格最小宽度限制：支持表格列宽度被极度压缩
REMOVE_MIN_CELL_WIDTH = true

# 可拖拽识别范围 (px)：鼠标需在此像素距离内拖动才会被判定为触发表格边界调整
DRAG_THRESHOLD = 20

# 记忆放缩状态：直至关闭 Typora 前记住表格的拖拽变形状态
RECORD_RESIZE = true


[datatables]
# =========== [ 基础 ] ===========
ENABLE = false
NAME = ""

# =========== [ 分页与排序 ] ===========
# 启用分页：对超大表格数据进行分页展示
PAGING = true

# 单页数据量：分页模式下每页包含的行数
PAGE_LENGTH = 25

